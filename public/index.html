<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Treekind</title>
        <style>
            :root {
                --bg: #fbf6ec;
                --surface: #fffdf8;
                --text: #2f2a25;
                --muted: #5f5750;
                --border: #e8dfd0;
                --focus: #8d8376;
                --logo-size: 200px;
                --space-1: 8px;
                --space-2: 12px;
                --space-3: 16px;
                --space-4: 24px;
                --space-5: 32px;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                background: linear-gradient(180deg, #fbf6ec 0%, #faf4e8 100%);
                color: var(--text);
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    "Helvetica Neue",
                    Arial,
                    sans-serif;
                font-size: 18px;
                line-height: 1.6;
            }

            .page {
                flex: 1;
                display: flex;
                flex-direction: column;
                width: min(760px, 100%);
                margin: 0 auto;
            }

            .hero {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 52vh;
                gap: var(--space-3);
                padding: var(--space-5) var(--space-4) var(--space-3);
                text-align: center;
            }

            .logo {
                width: min(var(--logo-size), 80vw, 42vh);
                height: min(var(--logo-size), 80vw, 42vh);
                object-fit: contain;
            }

            .intro {
                margin: 0;
                max-width: 40ch;
                color: var(--muted);
            }

            .github-link {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 30px;
                height: 30px;
                color: #24292f;
                opacity: 0.5;
            }

            .github-link:hover,
            .github-link:focus-visible {
                opacity: 1;
            }

            a:focus-visible {
                outline: 2px solid var(--focus);
                outline-offset: 3px;
                border-radius: 6px;
            }

            .github-link svg {
                width: 100%;
                height: 100%;
                fill: currentColor;
            }

            .site-footer {
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 0 var(--space-4) var(--space-3);
            }

            .projects {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding: var(--space-2) var(--space-4) var(--space-5);
            }

            .projects-content {
                width: min(700px, 100%);
            }

            .project-card {
                border: 1px solid var(--border);
                border-radius: 14px;
                background: var(--surface);
                box-shadow: 0 4px 14px rgba(47, 42, 37, 0.06);
                padding: var(--space-3);
            }

            .project-name {
                margin: 0 0 var(--space-1);
                font-size: 1.2rem;
                font-weight: 700;
                line-height: 1.3;
            }

            .project-name a {
                color: var(--text);
                text-decoration-thickness: 1px;
                text-underline-offset: 3px;
            }

            .project-description {
                margin: 0;
                max-width: 62ch;
                color: var(--muted);
            }

            @media (max-width: 700px) {
                :root {
                    --logo-size: 240px;
                }

                .hero {
                    min-height: auto;
                    padding: var(--space-4) var(--space-3) var(--space-2);
                }

                .projects {
                    padding: var(--space-2) var(--space-3) var(--space-4);
                }

                .site-footer {
                    padding: 0 var(--space-3) var(--space-2);
                }
            }
        </style>
    </head>
    <body>
        <main class="page">
            <section class="hero" aria-label="Treekind home">
                <img class="logo" src="logo.svg" alt="Treekind logo" />
                <p class="intro">
                    Calm learning tools focused on emotional safety, predictable
                    flow, and meaningful language
                </p>
            </section>

            <section class="projects" aria-label="Tools">
                <div class="projects-content">
                    <article class="project-card">
                        <h3 class="project-name">
                            <a
                                href="https://type.treekind.org"
                                target="_blank"
                                rel="noopener noreferrer"
                                >CalmType</a
                            >
                        </h3>
                        <p class="project-description">
                            CalmType is a calm typing trainer in German for the
                            Swiss keyboard layout, with a clear and predictable
                            flow and no scores, penalties, or pressure.
                        </p>
                    </article>
                </div>
            </section>
        </main>
        <footer class="site-footer" aria-label="Site links">
            <a
                class="github-link"
                href="https://github.com/treekind"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Visit Treekind on GitHub"
            >
                <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.66 7.66 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                    ></path>
                </svg>
            </a>
        </footer>
    </body>
</html>
